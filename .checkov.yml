# Checkov configuration for terraform-aws-iso27001 module

framework:
  - terraform

skip-path:
  - test_data
  - examples

skip-check:
  # CKV_TF_1: Module sources use version pins from private registry (registry.infrahouse.com)
  # InfraHouse standard: exact version pinning from registry.infrahouse.com,
  # which provides better maintainability than commit hash pinning.
  # Renovate manages version version updates via individual PRs for explicit review.
  - CKV_TF_1

  # CKV_TF_2: Module sources use version pins from private registry
  # Same as CKV_TF_1 - Renovate handles module version updates.
  - CKV_TF_2

  # CKV_AWS_111: InfraHouseLogRetention policy uses "*" resource for write-without-constraints actions.
  # This role enforces log retention and tags Control Tower-managed log groups (for Vanta exclusion)
  # across ALL log groups in the account. Scoping to specific log group ARNs would defeat the purpose.
  - CKV_AWS_111

  # CKV_AWS_356: InfraHouseLogRetention policy uses "*" resource for restrictable actions.
  # logs:DescribeLogGroups, logs:PutRetentionPolicy, logs:ListTagsForResource, logs:TagResource,
  # and logs:UntagResource must operate on all log groups to enforce retention and tagging org-wide.
  # Note: logs:DescribeLogGroups does not support resource-level permissions at all.
  - CKV_AWS_356

  # CKV_AWS_9: Password expiration is no longer recommended by NIST SP 800-63B
  # Section 3.1.1.2: "Verifiers and CSPs SHALL NOT require subscribers to change
  # passwords periodically." MFA and IAM Identity Center are the preferred controls.
  # https://pages.nist.gov/800-63-4/sp800-63b.html#password
  - CKV_AWS_9

  # CKV2_AWS_3: This check expects organization-level GuardDuty delegation (admin
  # account + member enrollment). This module enables GuardDuty per member account,
  # which is the correct pattern. Org-level delegation is handled separately in the
  # management account.
  - CKV2_AWS_3

compact: true
quiet: false
